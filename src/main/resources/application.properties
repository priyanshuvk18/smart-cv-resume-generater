# Database Configuration (H2 for fast demo, MySQL below for production)
spring.datasource.url=jdbc:h2:mem:smartcv_db;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# MySQL Configuration (Uncomment for production)
# spring.datasource.url=jdbc:mysql://localhost:3306/smartcv_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
# spring.datasource.username=root
# spring.datasource.password=root
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# File Upload Configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# App Properties
smartcv.app.jwtSecret=SecretKeySmartCVBuilderIndustrialLevelApp2026SecureKeyForJWTTokenGenerationPurposeOnly
smartcv.app.jwtExpirationMs=86400000

# Logging
logging.level.org.springframework.security=DEBUG

# Server Port
server.port=8081

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# Swagger configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
