<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <style>
        @page { size: A4; margin: 0; }
        body { font-family: 'Outfit', 'Helvetica', sans-serif; color: #2d3436; margin: 0; padding: 0; background: #fff; }
        .header { background: linear-gradient(135deg, #4361ee 0%, #3f37c9 100%); color: #fff; padding: 60px 40px; text-align: center; border-bottom: 8px solid #4895ef; }
        .name { font-size: 32pt; font-weight: 800; text-transform: uppercase; margin-bottom: 15px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .title { font-size: 16pt; font-weight: 300; letter-spacing: 5px; opacity: 0.9; }
        .container { padding: 40px; display: grid; grid-template-columns: 2fr 1fr; gap: 40px; }
        .section-title { font-size: 18pt; font-weight: 700; color: #4361ee; margin-bottom: 25px; display: flex; align-items: center; }
        .section-title::after { content: ''; flex-grow: 1; height: 3px; background: #f0f3ff; margin-left: 20px; }
        .item { margin-bottom: 30px; position: relative; padding-left: 20px; border-left: 3px solid #f0f3ff; }
        .item-title { font-size: 14pt; font-weight: bold; color: #3f37c9; }
        .item-subtitle { color: #636e72; font-weight: 600; font-size: 11pt; }
        .item-date { position: absolute; left: -120px; width: 100px; text-align: right; color: #b2bec3; font-size: 9pt; font-weight: 700; top: 5px; }
        .description-text { margin-top: 10px; font-size: 10pt; line-height: 1.6; color: #2d3436; }
        .sidebar-section { background: #f8f9fa; border-radius: 20px; padding: 30px; margin-bottom: 30px; border: 1px solid #eef2ff; }
        .sidebar-title { font-size: 12pt; font-weight: 700; color: #2d3436; text-transform: uppercase; margin-bottom: 20px; display: block; }
        .skill-tag { display: inline-block; background: #4361ee; color: #fff; padding: 5px 15px; border-radius: 20px; margin-right: 10px; margin-bottom: 10px; font-size: 9pt; font-weight: 600; }
        .contact-item { display: flex; align-items: center; margin-bottom: 15px; font-size: 9.5pt; color: #636e72; }
    </style>
</head>
<body>
    <div class="header">
        <div class="name" th:text="${cv.fullName}">JANE SMITH</div>
        <div class="title" th:text="${cv.title}">UI/UX ARCHITECT</div>
    </div>

    <div style="padding: 40px;">
        <table>
            <tr>
                <td style="width: 65%; padding-right: 40px;" valign="top">
                    <div class="section-title">Profile</div>
                    <div style="font-size: 11pt; line-height: 1.8; color: #2d3436; margin-bottom: 40px;" th:text="${cv.summary}">Summary...</div>

                    <div class="section-title">Experience</div>
                    <div th:each="exp : ${cv.experience}" class="item">
                        <div class="item-title" th:text="${exp.position}">Designer</div>
                        <div class="item-subtitle" th:text="${exp.company}">Company</div>
                        <div style="font-size: 8.5pt; color: #b2bec3; margin: 5px 0;" th:text="${exp.startDate + ' - ' + exp.endDate}">2020-2024</div>
                        <div class="description-text" th:text="${exp.description}">Tasks...</div>
                    </div>

                    <div class="section-title">Education</div>
                    <div th:each="edu : ${cv.education}" class="item">
                        <div class="item-title" th:text="${edu.degree}">Degree</div>
                        <div class="item-subtitle" th:text="${edu.school}">University</div>
                        <div style="font-size: 8.5pt; color: #b2bec3; margin: 5px 0;" th:text="${edu.startDate + ' - ' + edu.endDate}">2020-2024</div>
                    </div>
                </td>
                <td style="width: 35%;" valign="top">
                    <div class="sidebar-section">
                        <span class="sidebar-title">Contact</span>
                        <div class="contact-item"><span th:text="${cv.email}">email@domain.com</span></div>
                        <div class="contact-item"><span th:text="${cv.phone}">+123456789</span></div>
                        <div class="contact-item"><span th:text="${cv.address}">Location</span></div>
                    </div>

                    <div class="sidebar-section">
                        <span class="sidebar-title">Expertise</span>
                        <div th:each="skill : ${cv.skills}" class="skill-tag" th:text="${skill.name}">Design</div>
                    </div>

                    <div class="sidebar-section" th:if="${not #lists.isEmpty(cv.projects)}">
                        <span class="sidebar-title">Key Projects</span>
                        <div th:each="proj : ${cv.projects}" style="margin-bottom: 15px;">
                            <div style="font-weight: 700; color: #4361ee; font-size: 10pt;" th:text="${proj.title}">TITLE</div>
                            <div style="font-size: 8.5pt; color: #636e72;" th:text="${proj.description}">Short description...</div>
                        </div>
                    </div>
                </td>
            </tr>
        </table>
    </div>
</body>
</html>
