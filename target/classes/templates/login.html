<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - SmartCV Builder</title>
    <!-- Use base head from layout... simpler to inline for logic -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-color: #4361ee; --light-bg: #f8f9fa; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--light-bg); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { width: 100%; max-width: 400px; padding: 40px; border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); background-color: #fff; }
        .btn-primary { background-color: var(--primary-color); border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: 600; }
        .form-control { border-radius: 10px; padding: 12px; border: 1px solid #dee2e6; }
        .form-control:focus { border-color: var(--primary-color); box-shadow: 0 0 0 0.25rem rgba(67, 97, 238, 0.1); }
    </style>
</head>
<body>

<div class="login-card">
    <div class="text-center mb-4">
        <a th:href="@{/}" style="font-size: 2rem; font-weight: 700; color: var(--primary-color); text-decoration: none;">
            <i class="fas fa-file-invoice me-2"></i>SmartCV
        </a>
        <h4 class="mt-4 fw-bold">Welcome Back</h4>
        <p class="text-muted small">Login to access your dashboard</p>
    </div>

    <div id="errorAlert" class="alert alert-danger d-none" role="alert"></div>

    <form id="loginForm">
        <div class="mb-3">
            <label class="form-label small fw-bold">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="name@company.com" required>
        </div>
        <div class="mb-3">
            <label class="form-label small fw-bold">Password</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>
        <div class="mb-3 form-check d-flex justify-content-between">
            <div>
                <input type="checkbox" class="form-check-input" id="remember">
                <label class="form-check-label small" for="remember">Remember me</label>
            </div>
            <a href="#" class="small text-decoration-none" style="color: var(--primary-color);">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary shadow-sm mb-4">Sign In</button>
    </form>

    <div class="text-center">
        <p class="text-muted small">Don't have an account? <a th:href="@{/register}" class="text-decoration-none fw-bold" style="color: var(--primary-color);">Create one</a></p>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorAlert = document.getElementById('errorAlert');

        try {
            const response = await fetch('/api/auth/signin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            if (response.ok) {
                const data = await response.json();
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data));
                
                // Store in cookie for SSR support (expires in 24h)
                document.cookie = `token=${data.token}; path=/; max-age=86400; SameSite=Strict`;
                
                window.location.href = '/dashboard';
            } else {
                const errorData = await response.json();
                errorAlert.textContent = errorData.message || 'Authentication failed. Please check your credentials.';
                errorAlert.classList.remove('d-none');
            }
        } catch (error) {
            console.error('Error logging in:', error);
            errorAlert.textContent = 'Server error. Please try again later.';
            errorAlert.classList.remove('d-none');
        }
    });
</script>
</body>
</html>
